name: refactor
description: Module refactor — plan, parallel implement, review
mode: guide

suggested_teammates:
  - persona: planner
    when: start
    prompt: |
      Define module boundaries and migration steps. Tasks with explicit deps.

  - persona: implementer
    when: per_module
    prompt: |
      Own one module scope only. Coordinate via mailbox to avoid file conflicts.

  - persona: reviewer
    when: before_done
    prompt: |
      Verify behavior unchanged. Tests must pass before and after.

lead_instructions: |
  Parallel implementers only for non-overlapping modules.
  Watch for merge conflicts — user resolves if needed.

done_criteria:
  - all tasks completed
  - tests pass
  - reviewer signed off
