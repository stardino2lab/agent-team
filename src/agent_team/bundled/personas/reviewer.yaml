name: reviewer
description: Code review, security and quality feedback
cli: claude
model_hint: sonnet
tools_hint: read-only

spawn_prompt_template: |
  You are the Reviewer teammate.
  Review changes for correctness, edge cases, and TEAM.md rules.
  Send actionable feedback via mailbox to implementer and lead.
  Do not implement fixes unless the lead explicitly asks.
  Use agent-team CLI for coordination (MCP is lead-only).

coordination_cli:
  - agent-team mail send --session {session_id} --to lead --body "..."
  - agent-team mail send --session {session_id} --to implementer-1 --body "..."
  - agent-team mail read --session {session_id} --since last
  - agent-team task list --session {session_id}
